# Nginx configuration for Logseq Sync Server
location __PATH__/ {
    if ($scheme = http) {
        rewrite ^ https://$server_name$request_uri? permanent;
    }

    # Secret Key Bypass Logic
    set $auth_header "";
    
    # 1. Check for X-Logseq-Secret header
    if ($http_x_logseq_secret = "__SECRET_KEY__") {
        set $auth_header "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJpc3MiOiJkdW1teSIsInN1YiI6InVzZXIifQ.";
    }

    # 2. Check for 'secret' query parameter (Useful for Beta apps with limited UI)
    if ($arg_secret = "__SECRET_KEY__") {
        set $auth_header "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJpc3MiOiJkdW1teSIsInN1YiI6InVzZXIifQ.";
    }

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Inject the dummy JWT if the secret key matched
    if ($auth_header != "") {
        proxy_set_header Authorization $auth_header;
    }

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Handle large uploads (sync blobs)
    client_max_body_size 100M;
}

# Dummy OIDC endpoints to make the "Login" button happy
location __PATH__/.well-known/openid-configuration {
    return 200 '{"issuer":"https://syncls.lovelaces.org","authorization_endpoint":"https://syncls.lovelaces.org/dummy-auth","token_endpoint":"https://syncls.lovelaces.org/dummy-token","jwks_uri":"https://syncls.lovelaces.org/dummy-jwks"}';
}
