# Nginx configuration for Logseq Sync Server
location __PATH__/ {
    if ($scheme = http) {
        rewrite ^ https://$server_name$request_uri? permanent;
    }

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Handle large uploads (sync blobs)
    client_max_body_size 100M;

    # SSO Integration
    # If the app is private, this will be handled by YunoHost SSO
    # If public, we might want to bypass for the WebSocket endpoint if it has its own auth
    include conf.d/yunohost_panel.conf.inc;
}
