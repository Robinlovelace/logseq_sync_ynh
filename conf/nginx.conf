# Nginx configuration for Logseq Sync Server
location __PATH__/ {
    if ($scheme = http) {
        rewrite ^ https://$server_name$request_uri? permanent;
    }

    # Secret Key Bypass Logic
    # If the user provided a secret key, we check for it in the X-Logseq-Secret header
    set $auth_header "";
    
    # We use a direct comparison here.
    if ($http_x_logseq_secret = "__SECRET_KEY__") {
        # This is a base64 encoded dummy JWT payload: {"iss": "dummy", "sub": "user"}
        set $auth_header "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJpc3MiOiJkdW1teSIsInN1YiI6InVzZXIifQ.";
    }

    # Inject the dummy JWT if the secret key matched
    if ($auth_header != "") {
        proxy_set_header Authorization $auth_header;
    }

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Handle large uploads (sync blobs)
    client_max_body_size 100M;
}
