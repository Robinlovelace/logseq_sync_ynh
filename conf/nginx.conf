# Nginx configuration for Logseq Sync Server
location __PATH__/ {
    if ($scheme = http) {
        rewrite ^ https://$server_name$request_uri? permanent;
    }

    # Secret Key Bypass Logic
    # If the user provided a secret key, we check for it in the X-Logseq-Secret header
    set $auth_valid 0;
    
    # We use a map or a direct comparison here. 
    # For YunoHost integration, we can template the secret in.
    if ($http_x_logseq_secret = "__SECRET_KEY__") {
        set $auth_valid 1;
    }

    # If Secret Key is valid, we inject a dummy JWT that the backend will accept 
    # because DB_SYNC_ALLOW_UNVERIFIED_JWT_CLAIMS=true is set.
    # The JWT payload just needs a valid 'iss' and 'sub'.
    if ($auth_valid = 1) {
        # This is a base64 encoded dummy JWT payload: {"iss": "dummy", "sub": "user"}
        proxy_set_header Authorization "Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJpc3MiOiJkdW1teSIsInN1YiI6InVzZXIifQ.";
    }

    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Handle large uploads (sync blobs)
    client_max_body_size 100M;

    # Fallback to SSO if no secret key is provided
    # include conf.d/yunohost_panel.conf.inc;
}
