version: '3'
services:
  logseq-sync:
    build: .
    container_name: logseq_sync
    restart: always
    environment:
      - DB_SYNC_PORT=8787
      - DB_SYNC_DATA_DIR=/app/data
      - DB_SYNC_BASE_URL=https://${DOMAIN}
      - DB_SYNC_ALLOW_UNVERIFIED_JWT_CLAIMS=${ALLOW_UNVERIFIED}
      # For OIDC support, user can set these manually in .env
      - COGNITO_ISSUER=${OIDC_ISSUER}
      - COGNITO_CLIENT_ID=${OIDC_CLIENT_ID}
    volumes:
      - ${DATA_DIR}:/app/data
    ports:
      - ${PORT}:8787
